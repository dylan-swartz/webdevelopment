<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Tytan Security</title>
    <link rel="stylesheet" href="styles\personalplan.css">
</head>
<body>
    <header>
    <div class="header-logo">
        <img src="images/tytan.png" alt="Tytan Security Logo">
        </div>
    
    <div class="header-info">
        <p class="colored">(435) 263-0506</p>
        </div>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contactus.html">Contact us</a>
</nav>

<main>
        <div class="content-images">
            <section class="form-container">
                <h2>Request a quote</h2>
                <form action="#" method="post">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="property">Property Type</label>
                    <input type="text" id="property" name="property" placeholder="Residential or Commercial">

                    <label for="comments">Additional comments</label>
                    <textarea id="comments" name="comments" rows="4"></textarea>

                    <button type="submit" class="colored">Submit</button>
                </form>
            </section>

            <section class="contact-sidebar">
                <img src="images/cedarbreaks.jpg" alt="Beautiful view of Cedar Breaks near Cedar City">
                
                <div class="contact-info">
                    <h3>Contact info</h3>
                    <p class="colored">(435) 263-0506</p>
                    <p>123 Security Way, Cedar City, UT</p>
                    <p>contact@tytansecurity.com</p>
                </div>
            </section>
        </div>

        <hr>

        <section>
            <p>Need a hand with your system or need an upgrade? Our Cedar City team is standing by.</p>
        </section>
    </main>

   <footer>
    <p>&copy; 2026 Tytan Security | <a href="site-plan.html">Site Plan</a></p>

    <div class="social-container">
        <a href="https://facebook.com" target="_blank">
            <img src="images/facebook.webp" alt="Facebook">
        </a>
        <a href="https://instagram.com" target="_blank">
            <img src="images/instagram.png" alt="Instagram">
        </a>
    </div>
</footer>

</html>
